name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    name: Test, Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # ── Quality gates ──────────────────────────────
      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      # ── Build & Package ────────────────────────────
      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --no-dependencies

      # ── Publish to Open VSX (primary registry) ────
      - name: Publish to Open VSX Registry
        run: npx ovsx publish archsketch-*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      # ── Publish to VS Code Marketplace (optional) ──
      # Only runs if VSCE_PAT secret is configured.
      # To enable: create an Azure DevOps PAT with Marketplace→Manage scope
      # and add it as a repo secret named VSCE_PAT.
      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies --packagePath archsketch-*.vsix
        if: ${{ env.HAS_VSCE_PAT == 'true' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          HAS_VSCE_PAT: ${{ secrets.VSCE_PAT != '' }}
        continue-on-error: true

      # ── Upload VSIX to the GitHub Release ──────────
      # Uses the latest release tag (most reliable across manifest configs)
      - name: Get latest release tag
        id: latest_tag
        run: |
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.latest_tag.outputs.tag }}
          files: "*.vsix"
