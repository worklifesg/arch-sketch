name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # ── Security ──────────────────────────────────
      - name: Audit dependencies
        run: npm audit --audit-level=high

      # ── Quality gates ─────────────────────────────
      - name: Type check
        run: npm run lint

      - name: Unit & performance tests
        run: npm test

      - name: Test coverage (threshold 45%)
        run: |
          npx vitest run --coverage --reporter=default 2>&1 | tee coverage-output.txt
          STMTS=$(grep 'Statements' coverage-output.txt | grep -oP '[\d.]+(?=%)' | head -1)
          echo "Statement coverage: ${STMTS}%"
          if (( $(echo "$STMTS < 45" | bc -l) )); then
            echo "::error::Coverage ${STMTS}% is below 45% threshold"
            exit 1
          fi

      # ── Build ─────────────────────────────────────
      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --no-dependencies

      - name: Check VSIX size
        run: |
          SIZE=$(stat -c%s archsketch-*.vsix)
          SIZE_KB=$((SIZE / 1024))
          echo "VSIX size: ${SIZE_KB} KB"
          if [ "$SIZE_KB" -gt 500 ]; then
            echo "::error::VSIX is ${SIZE_KB}KB — exceeds 500KB limit. Check .vscodeignore."
            exit 1
          fi

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: archsketch-vsix
          path: archsketch-*.vsix
          retention-days: 14
