name: Pre-Release

on:
  push:
    tags:
      - "v*-beta*"
      - "v*-rc*"
      - "v*-alpha*"

permissions:
  contents: write

jobs:
  pre-release:
    name: Test, Build & Publish Pre-Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # ── Quality gates ──────────────────────────────
      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      # ── Build & Package ────────────────────────────
      - name: Build
        run: npm run build

      - name: Package VSIX (pre-release)
        run: npx vsce package --no-dependencies --pre-release

      # ── Publish as pre-release ─────────────────────
      - name: Publish pre-release to VS Code Marketplace
        run: npx vsce publish --no-dependencies --pre-release --packagePath archsketch-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish pre-release to Open VSX
        run: npx ovsx publish archsketch-*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        continue-on-error: true

      # ── GitHub Pre-Release ─────────────────────────
      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: "*.vsix"
