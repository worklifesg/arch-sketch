name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    name: Test, Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # ── Quality gates (don't publish broken code) ──
      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      # ── Build & Package ────────────────────────────
      - name: Build
        run: npm run build

      - name: Package VSIX (pre-release)
        if: github.event.release.prerelease
        run: npx vsce package --no-dependencies --pre-release

      - name: Package VSIX (stable)
        if: ${{ !github.event.release.prerelease }}
        run: npx vsce package --no-dependencies

      # ── Publish to VS Code Marketplace ─────────────
      - name: Publish pre-release to Marketplace
        if: github.event.release.prerelease
        run: npx vsce publish --no-dependencies --pre-release --packagePath archsketch-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish stable to Marketplace
        if: ${{ !github.event.release.prerelease }}
        run: npx vsce publish --no-dependencies --packagePath archsketch-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # ── Publish to Open VSX (VSCodium / Gitpod) ───
      - name: Publish to Open VSX Registry
        run: npx ovsx publish archsketch-*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        continue-on-error: true

      # ── Upload VSIX to the GitHub Release ──────────
      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: "*.vsix"
