name: Publish

# Manual trigger for re-publishing or pre-releases
# Normal releases are handled by release-please.yml
on:
  workflow_dispatch:
    inputs:
      pre-release:
        description: "Publish as pre-release"
        type: boolean
        default: false
      tag:
        description: "Release tag to attach VSIX to (e.g. archsketch-v0.1.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Test, Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # ── Quality gates (don't publish broken code) ──
      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      # ── Build & Package ────────────────────────────
      - name: Build
        run: npm run build

      - name: Package VSIX (pre-release)
        if: inputs.pre-release
        run: npx vsce package --no-dependencies --pre-release

      - name: Package VSIX (stable)
        if: ${{ !inputs.pre-release }}
        run: npx vsce package --no-dependencies

      # ── Publish to Open VSX (primary registry) ────
      - name: Publish to Open VSX Registry
        run: npx ovsx publish archsketch-*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      # ── Publish to VS Code Marketplace (optional) ──
      - name: Publish pre-release to Marketplace
        if: inputs.pre-release && secrets.VSCE_PAT != ''
        run: npx vsce publish --no-dependencies --pre-release --packagePath archsketch-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        continue-on-error: true

      - name: Publish stable to Marketplace
        if: ${{ !inputs.pre-release && secrets.VSCE_PAT != '' }}
        run: npx vsce publish --no-dependencies --packagePath archsketch-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        continue-on-error: true

      # ── Upload VSIX to the GitHub Release ──────────
      - name: Upload VSIX to release
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: "*.vsix"
