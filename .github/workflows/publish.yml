name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Test, Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # ── Quality gates (don't publish broken code) ──
      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      # ── Build & Package ────────────────────────────
      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx vsce package --no-dependencies

      # ── Publish to VS Code Marketplace ─────────────
      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies --packagePath archsketch-*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # ── Publish to Open VSX (VSCodium / Gitpod) ───
      - name: Publish to Open VSX Registry
        run: npx ovsx publish archsketch-*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        continue-on-error: true  # Don't fail release if OVSX isn't set up yet

      # ── GitHub Release ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.vsix"
