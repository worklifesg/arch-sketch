<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f9b8e"/>
      <stop offset="100%" style="stop-color:#0bbfac"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#7b68ee"/>
    </linearGradient>
    <linearGradient id="node3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Connection lines (drawn first, behind nodes) -->
  <line x1="40" y1="42" x2="88" y2="42" stroke="#0f9b8e" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="40" y1="42" x2="64" y2="80" stroke="#0f9b8e" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="88" y1="42" x2="64" y2="80" stroke="#0f9b8e" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Top-left node (service box) -->
  <rect x="24" y="28" width="32" height="28" rx="5" fill="url(#node1)" opacity="0.9"/>
  <rect x="30" y="34" width="8" height="2" rx="1" fill="white" opacity="0.8"/>
  <rect x="30" y="38" width="14" height="2" rx="1" fill="white" opacity="0.5"/>
  <rect x="30" y="42" width="11" height="2" rx="1" fill="white" opacity="0.5"/>

  <!-- Top-right node (database cylinder) -->
  <ellipse cx="88" cy="33" rx="14" ry="5" fill="url(#node2)" opacity="0.9"/>
  <rect x="74" y="33" width="28" height="18" fill="url(#node2)" opacity="0.9"/>
  <ellipse cx="88" cy="51" rx="14" ry="5" fill="url(#node2)" opacity="0.8"/>
  <line x1="74" y1="33" x2="74" y2="51" stroke="#533483" stroke-width="0.5"/>
  <line x1="102" y1="33" x2="102" y2="51" stroke="#533483" stroke-width="0.5"/>

  <!-- Bottom center node (cloud shape) -->
  <ellipse cx="64" cy="84" rx="18" ry="10" fill="url(#node3)" opacity="0.9"/>
  <ellipse cx="55" cy="80" rx="10" ry="8" fill="url(#node3)" opacity="0.9"/>
  <ellipse cx="73" cy="80" rx="10" ry="8" fill="url(#node3)" opacity="0.9"/>

  <!-- AI sparkle / magic wand element -->
  <g transform="translate(96, 72)" fill="url(#accent)">
    <!-- Pencil/wand body -->
    <rect x="2" y="2" width="3" height="22" rx="1" transform="rotate(-40 3.5 13)" fill="#0bbfac"/>
    <!-- Sparkles -->
    <circle cx="0" cy="4" r="1.5" fill="#0bbfac" opacity="0.9"/>
    <circle cx="8" cy="0" r="1" fill="#0bbfac" opacity="0.7"/>
    <circle cx="-2" cy="-2" r="0.8" fill="#0bbfac" opacity="0.5"/>
    <!-- Star burst -->
    <path d="M3,-4 L4,-1 L7,-2 L5,0.5 L8,2 L4.5,2 L4,5 L2.5,2.5 L-1,3 L1,0.5 L-2,-1 L1.5,-0.5Z" fill="#0bbfac" opacity="0.85"/>
  </g>

  <!-- "AS" text mark -->
  <text x="64" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0bbfac" letter-spacing="2">ARCH</text>
</svg>
